<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | Student Management</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body"> 
   <div class="login-container">
    <h2>Admin Portal</h2> <p>Sign in to manage your records</p> <div class="form-group">
    </div>

    <div class="form-group">
    <label>Username <span class="required">*</span></label>
    <div class="input-wrapper">
        <input type="text" id="username" placeholder="admin">
        <span class="input-icon">✉️</span> </div>
</div>

<div class="form-group">
    <div class="label-row">
        <label>Password <span class="required">*</span></label>
    </div>
    <div class="input-wrapper">
        <input type="password" id="password" placeholder="•••">
        <span class="input-icon">🔒</span> </div>
</div>

    <button onclick="handleLogin()" class="sign-in-btn">Sign-in</button>
</div>

    <script src="login.js"></script>
</body>
</html>
